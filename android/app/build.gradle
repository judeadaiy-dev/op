plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.judeadaiy.chat_app"
    compileSdkVersion 34 // ثابت ومحدث

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.judeadaiy.chat_app"
        
        // هنا الحل الجذري والصريح يدوياً:
        minSdkVersion 23
        targetSdkVersion 34
        
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            // سنعتمد توقيع الـ debug مؤقتاً لتوليد APK صالح للتثبيت فوراً دون تعقيد مفاتيح
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source '../..'
}

