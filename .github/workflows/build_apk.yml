name: Build Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: false

      # 1. تأمين ملف الخصائص يدوياً داخل السيرفر بالمقاييس المطلوبة ليتطابق مع ملفك
      - name: Ensure local.properties configuration
        run: |
          mkdir -p android
          echo "flutter.compileSdkVersion=34" > android/local.properties
          echo "flutter.minSdkVersion=23" >> android/local.properties
          echo "flutter.targetSdkVersion=34" >> android/local.properties

      # 2. جلب حزم ومكتبات المشروع القياسية (pub get)
      - name: Install dependencies
        run: flutter pub get

      # 3. أمر البناء الفعلي والنظيف الموجه للملفات التي رفعتها أنت بيدك
      - name: Build APK Release
        run: |
          flutter build apk --release --no-tree-shake-icons --target-platform android-arm,android-arm64,android-x64

      # 4. رفع ملف الـ APK النهائي لتتمكن من تحميله فوراً
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk

