name: Ultimate Native Flutter Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. تهيئة بيئة الجافا الحديثة
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 2. تهيئة محرك فلاتر المستقر
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: false

      # 3. جلب الحزم والمكتبات
      - name: Install Dependencies
        run: flutter pub get

      # 4. توليد مجلد أندرويد أصلي ونظيف تماماً من المحرك مباشرة
      - name: Recreate Clean Native Android Project
        run: |
          rm -rf android
          flutter create . --platforms=android --org=com.judeadaiy

      # 5. التعديل الذكي: حقن الإعدادات داخل الملفات الرسمية دون إعادة كتابتها
      - name: Configure SDK and Fix Dependencies
        run: |
          # أ. ضبط ملف local.properties ومسار الـ SDK
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "flutter.compileSdkVersion=34" >> android/local.properties
          echo "flutter.minSdkVersion=23" >> android/local.properties
          echo "flutter.targetSdkVersion=34" >> android/local.properties
          
          # ب. إجبار المكاتب الخارجية القديمة على تبني minSdkVersion 23 غصباً عنها لمنع خطأ مكتبة الصوت
          echo -e "\nsubprojects {\n    afterEvaluate { project ->\n        if (project.hasProperty('android')) {\n            project.android {\n                compileSdkVersion 34\n                defaultConfig {\n                    minSdkVersion 23\n                }\n            }\n        }\n    }\n}" >> android/build.gradle

      # 6. تشغيل البناء الصافي (سيعتمد على الهيكل الأصلي والملفات الرسمية لفلاتر)
      - name: Build APK Release
        run: |
          flutter build apk --release --no-tree-shake-icons --target-platform android-arm,android-arm64,android-x64

      # 7. رفع ملف الـ APK النهائي للتحميل
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: App-ChatApp-Release
          path: build/app/outputs/flutter-apk/app-release.apk

