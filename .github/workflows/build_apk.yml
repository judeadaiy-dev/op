name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

# هذه الإضافة تمنع تداخل عمليات البناء
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: flutter pub get
        
      - name: Build APK
        run: |
          flutter clean
          flutter pub get
          # إضافة --verbose لرؤية تفاصيل الملفات التي يتم تحميلها
          # إزالة الأوامر التي قد تسبب "exit code 64"
          flutter build apk --release --split-per-abi --verbose

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: final_apk/
