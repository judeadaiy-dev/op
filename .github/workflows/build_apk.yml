name: Standard Build Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. تهيئة بيئة جافا الحديثة والمستقرة (JDK 17)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 2. تثبيت محرك فلاتر المستقر بالإصدار 3.22.0
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      # 3. تهيئة وإكمال ملفات أندرويد الناقصة والتنظيف الفوري
      - name: Integrate and Complete Android Structure
        run: |
          flutter config --no-analytics
          flutter create . --platforms=android --org=com.judeadaiy
          flutter clean

      # 4. زرع ملف settings.gradle في المجلد الرئيسي وفي مجلد android لمنع تعارض مكاتب فلاتر
      - name: Rewrite and Fix Settings Gradle (Root & Android)
        run: |
          mkdir -p android
          
          # كود الإعدادات القياسي الحديث
          cat << 'EOF' > android/settings.gradle
          pluginManagement {
              def flutterSdkPath = {
                  def properties = new Properties()
                  def file = new File(settingsDir, "local.properties")
                  if (file.exists()) {
                      file.withReader("UTF-8") { reader -> properties.load(reader) }
                  }
                  def sdkPath = properties.getProperty("flutter.sdk")
                  assert sdkPath != null, "flutter.sdk not set in local.properties"
                  return sdkPath
              }()

              includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          plugins {
              id "dev.flutter.flutter-plugin-loader" version "1.0.0"
              id "com.android.application" version "8.2.0" apply false
              id "org.jetbrains.kotlin.android" version "1.8.22" apply false
          }

          include ":app"
          EOF
          
          # نسخ نفس الملف للجذر (Root) لحل مشكلة الإضافة المباشرة الفاشلة
          cp android/settings.gradle ./settings.gradle

      # 5. حقن مسار الـ SDK والإصدارات في ملف الخصائص
      - name: Configure SDK and Gradle Properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "flutter.compileSdkVersion=34" >> android/local.properties
          echo "flutter.minSdkVersion=23" >> android/local.properties
          echo "flutter.targetSdkVersion=34" >> android/local.properties
          
          # تهيئة الذاكرة ونظام الـ AndroidX ومنع تعارض المكاتب
          echo "android.useAndroidX=true" > android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx3072m -XX:MaxMetaspaceSize=1024m" >> android/gradle.properties
          
          # نسخ الـ local.properties للجذر أيضاً احتياطاً
          cp android/local.properties ./local.properties

      # 6. ترقية الـ Wrapper ليتوافق مع نظام الأندرويد الحديث وجافا 17
      - name: Upgrade Gradle Wrapper Version
        run: |
          if [ -f android/gradle/wrapper/gradle-wrapper.properties ]; then
            sed -i 's/gradle-.*-bin.zip/gradle-8.2-all.zip/g' android/gradle/wrapper/gradle-wrapper.properties
          fi

      # 7. تحديث ملف الجرادل للتطبيق لفرض جافا 17 الموحدة وحل تعارض الـ JVM
      - name: Patch Application Gradle for Java 17 Compatibility
        run: |
          if [ -f android/app/build.gradle ]; then
            # فرض قيم الـ SDK الصريحة واسم الحزمة المطلوبة لتطبيقك
            sed -i 's/minSdkVersion .*/minSdkVersion 23/g' android/app/build.gradle
            sed -i 's/targetSdkVersion .*/targetSdkVersion 34/g' android/app/build.gradle
            sed -i 's/compileSdkVersion .*/compileSdkVersion 34/g' android/app/build.gradle
            
            # توحيد جافا 17 للكوتلن والجافا لجميع المكتبات الفرعية والمشاريع المشتركة لمنع تعارض الـ JVM
            sed -i 's/sourceCompatibility .*/sourceCompatibility JavaVersion.VERSION_17/g' android/app/build.gradle
            sed -i 's/targetCompatibility .*/targetCompatibility JavaVersion.VERSION_17/g' android/app/build.gradle
            sed -i 's/jvmTarget = .*/jvmTarget = "17"/g' android/app/build.gradle
            
            # حقن كود برمجى لضمان تمرير الـ SDK للمشاريع الفرعية تلقائياً عند التجميع
            cat << 'EOF' >> android/app/build.gradle

            subprojects {
                project.tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
                    kotlinOptions {
                        jvmTarget = "17"
                    }
                }
                project.tasks.withType(JavaCompile).configureEach {
                    sourceCompatibility = JavaVersion.VERSION_17
                    targetCompatibility = JavaVersion.VERSION_17
                }
            }
          EOF
          fi

      # 8. تحميل حزم الاعتماديات (Dependencies) الخاصة بفلاتر
      - name: Install Dependencies
        run: flutter pub get

      # 9. البناء الفعلي لملف الـ APK بصيغة الـ Release
      - name: Build APK
        run: flutter build apk --release

      # 10. رفع ملف الـ APK الناتج لتتمكن من تحميله مباشرة من صفحة الـ Actions
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
