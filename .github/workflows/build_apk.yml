name: Ultimate Pure Java Flutter Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. تهيئة بيئة الجافا الحديثة والمستقرة
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 2. تهيئة محرك فلاتر المستقر المتوافق مع الـ SDK الخاص بك
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: false

      # 3. جلب الحزم والمكتبات المذكورة في pubspec.yaml
      - name: Install Dependencies
        run: flutter pub get

      # 4. التوليد الذكي: بناء هيكل أندرويد يعتمد على الجافا وحزمتك الرسمية لمنع أخطاء الكوتلن
      - name: Recreate Base Android Structure with Java
        run: |
          rm -rf android
          flutter create . --platforms=android --org=com.judeadaiy --android-language java

      # 5. الهندسة الذكية: حقن التوافقية الشاملة لإنهاء أخطاء المكاتب الخارجية (صوت، اتصال، إلخ)
      - name: Inject Compatibility Layer
        run: |
          # أ. ضبط ملف الخصائص الأساسي ومسارات الـ SDK
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "flutter.compileSdkVersion=34" >> android/local.properties
          echo "flutter.minSdkVersion=23" >> android/local.properties
          echo "flutter.targetSdkVersion=34" >> android/local.properties
          
          # ب. كتابة ملف settings.gradle ليتوافق مع فلاتر 3.22 والمكتبات القديمة معاً
          cat << 'EOF' > android/settings.gradle
          pluginManagement {
              def flutterSdkPath = {
                  def properties = new Properties()
                  def file = new File(settingsDir, "local.properties")
                  if (file.exists()) {
                      properties.load(file.newDataInputStream())
                  }
                  def sdkPath = properties.getProperty("flutter.sdk")
                  assert sdkPath != null, "flutter.sdk not set in local.properties"
                  return sdkPath
              }()

              includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          plugins {
              id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
              id "com.android.application" version "7.3.0" apply false
          }

          include ":app"
          EOF

          # ج. كتابة ملف app/build.gradle لفرض الحزمة الصريحة com.judeadaiy.chat_app والجافا 17
          cat << 'EOF' > android/app/build.gradle
          plugins {
              id "com.android.application"
              id "dev.flutter.flutter-gradle-plugin"
          }

          def localProperties = new Properties()
          def localPropertiesFile = rootProject.file('local.properties')
          if (localPropertiesFile.exists()) {
              localPropertiesFile.withReader('UTF-8') { reader ->
                  localProperties.load(reader)
              }
          }

          def flutterRoot = localProperties.getProperty('flutter.sdk')
          if (flutterRoot == null) {
              throw new GradleException("Flutter SDK not found. Define location with flutter.sdk in the local.properties file.")
          }

          android {
              namespace "com.judeadaiy.chat_app"
              compileSdkVersion 34

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }

              defaultConfig {
                  applicationId "com.judeadaiy.chat_app"
                  minSdkVersion 23
                  targetSdkVersion 34
                  versionCode 1
                  versionName "1.0.0"
              }
          }

          // إجبار كل المكاتب الخارجية (مثل record و connectivity_plus) على استخدام نفس التوافقية
          subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      project.android {
                          compileSdkVersion 34
                          buildToolsVersion "34.0.0"
                          defaultConfig {
                              minSdkVersion 23
                          }
                      }
                  }
              }
          }
          EOF

          # د. مسح أي أثر للكوتلن وحقن ملف MainActivity.java النظيف والمطابق للحزمة الرسمية
          rm -rf android/app/src/main/kotlin
          mkdir -p android/app/src/main/java/com/judeadaiy/chat_app
          cat << 'EOF' > android/app/src/main/java/com/judeadaiy/chat_app/MainActivity.java
          package com.judeadaiy.chat_app;

          import io.flutter.embedding.android.FlutterActivity;

          public class MainActivity extends FlutterActivity {
          }
          EOF

      # 6. أمر البناء الصريح والنظيف الموجه للملف الحالي
      - name: Build APK Release
        run: |
          flutter build apk --release --no-tree-shake-icons --target-platform android-arm,android-arm64,android-x64

      # 7. رفع ملف الـ APK النهائي للتحميل
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: App-ChatApp-Release
          path: build/app/outputs/flutter-apk/app-release.apk
