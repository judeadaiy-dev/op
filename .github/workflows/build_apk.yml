name: Ultimate Strict Overwrite & Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. تثبيت الجافا المتوافقة
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 2. تهيئة محرك فلاتر المستقر
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: false

      # 3. تأمين مسارات الموارد لـ pubspec لمنع أي توقف
      - name: Secure Assets and Icon
        run: |
          mkdir -p assets/images
          if [ ! -f "assets/images/app_logo.png" ]; then
            touch assets/images/app_logo.png
          fi

      # 4. 🚨 الأمر الصارم: تدمير مجلد أندرويد القديم المعطوب وصناعة مجلد رسمي ونظيف 100%
      - name: Nuke Old Android Files & Regenerate Clean Structure
        run: |
          rm -rf android
          flutter create . --platforms android
          flutter pub get

      # 5. بناء جسر الـ SDK والجرادل ليرتبط بالهيكلية الجديدة تلقائياً
      - name: Configure Android SDK & Gradle Bridge
        run: |
          cat << 'EOF' > android/local.properties
          sdk.dir=/usr/local/lib/android/sdk
          flutter.sdk=/opt/hostedtoolcache/flutter/stable-3.22.0-x64/flutter
          flutter.compileSdkVersion=34
          flutter.minSdkVersion=23
          flutter.targetSdkVersion=34
          EOF

      # 6. أمر البناء النهائي والمباشر لإنتاج الـ APK رغماً عن الأخطاء القديمة
      - name: Build APK Release
        run: |
          flutter build apk --release --no-tree-shake-icons --target-platform android-arm,android-arm64,android-x64

      # 7. استخراج ورفع ملف تطبيق SeaChat النهائي لتثبيته فوراً على جوالك
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk
