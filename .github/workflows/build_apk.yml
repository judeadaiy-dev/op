name: Smart Build Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. تهيئة بيئة الجافا الحديثة (تتوافق تلقائياً مع أحدث أدوات أندرويد)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 2. تهيئة محرك فلاتر المستقر
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: false

      # 3. جلب الحزم والمكتبات لقراءتها وفهم متطلباتها
      - name: Install and Analyze Dependencies
        run: flutter pub get

      # 4. أمر التيرمنال الذكي: توليد وهيكلة ملفات الأندرويد بناءً على تحليل الحزم تلقائياً
      - name: Auto-Generate Smart Android Structure
        run: |
          flutter create . --platforms=android --org=com.judeadaiy
          
          # إجبار ملف الخصائص على تبني الـ SDK الحديث المطلوب للحزم بدون لمس الأكواد البرمجية
          echo "flutter.compileSdkVersion=34" > android/local.properties
          echo "flutter.minSdkVersion=23" >> android/local.properties
          echo "flutter.targetSdkVersion=34" >> android/local.properties

      # 5. التحديث التلقائي الشامل لأدوات بناء أندرويد (الجرادل والكوتلن) لأحدث نسخة مستقرة
      - name: Update Build Tools to Latest Compatible Versions
        run: |
          # تحديث محرك الجرادل الرئيسي للسيرفر ليتوافق مع الـ Sealed Classes وحزمة الصوت
          cd android
          ./gradlew wrapper --gradle-version 8.4
          cd ..

      # 6. أمر البناء الصريح والنظيف (سيقوم المترجم بقراءة المتطلبات وبنائها فوراً)
      - name: Build APK Release
        run: |
          flutter build apk --release --no-tree-shake-icons --target-platform android-arm,android-arm64,android-x64

      # 7. رفع ملف الـ APK النهائي الجاهز للتثبيت
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: App-Latest-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk
