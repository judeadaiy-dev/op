name: Fixed Native Bridge Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. تثبيت الجافا المتوافقة
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 2. تهيئة محرك فلاتر المستقر
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: false

      # 3. جلب مكاتب تطبيق الشات والصوت
      - name: Install Dependencies
        run: |
          flutter pub get
          flutter clean
          flutter pub get

      # 4. بناء جسر الـ SDK والجرادل ليرتبط بملف الـ settings.gradle الجديد
      - name: Configure Android SDK & Gradle Bridge
        run: |
          cat << 'EOF' > android/local.properties
          sdk.dir=/usr/local/lib/android/sdk
          flutter.sdk=/opt/hostedtoolcache/flutter/stable-3.22.0-x64/flutter
          flutter.compileSdkVersion=34
          flutter.minSdkVersion=23
          flutter.targetSdkVersion=34
          EOF
          
          mkdir -p android/gradle/wrapper
          cat << 'EOF' > android/gradle/wrapper/gradle-wrapper.properties
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-all.zip
          EOF

      # 5. أمر البناء المباشر
      - name: Build APK Release
        run: |
          flutter build apk --release --no-tree-shake-icons --target-platform android-arm,android-arm64,android-x64

      # 6. رفع الـ APK الجاهز تماماً للتثبيت
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk
