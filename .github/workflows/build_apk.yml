name: Fixed Ultimate Flutter Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. تهيئة بيئة الجافا الحديثة
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 2. تهيئة محرك فلاتر المستقر
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: false

      # 3. جلب الحزم والمكتبات
      - name: Install Dependencies
        run: flutter pub get

      # 4. مسح الهيكل المكسور وتوليد بنية أساسية نظيفة
      - name: Recreate Base Android Structure
        run: |
          rm -rf android
          flutter create . --platforms=android --org=com.judeadaiy

      # 5. السحر الهندسي: حقن ملفات التوافقية الشاملة بالترتيب الصحيح مع إصلاح ملف الكوتلن
      - name: Inject Compatibility Layer
        run: |
          # أ. ضبط ملف الخصائص الأساسي
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "flutter.compileSdkVersion=34" >> android/local.properties
          echo "flutter.minSdkVersion=23" >> android/local.properties
          echo "flutter.targetSdkVersion=34" >> android/local.properties
          
          # ب. كتابة ملف settings.gradle الرئيسي والمستقر لقراءة الـ Plugins
          cat << 'EOF' > android/settings.gradle
          pluginManagement {
              def flutterSdkPath = {
                  def properties = new Properties()
                  def file = new File(settingsDir, "local.properties")
                  if (file.exists()) {
                      properties.load(file.newDataInputStream())
                  }
                  def sdkPath = properties.getProperty("flutter.sdk")
                  assert sdkPath != null, "flutter.sdk not set in local.properties"
                  return sdkPath
              }()

              includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          plugins {
              id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
              id "com.android.application" version "7.3.0" apply false
              id "org.jetbrains.kotlin.android" version "1.8.22" apply false
          }

          include ":app"
          EOF

          # ج. إعادة كتابة ملف app/build.gradle ليكون نظامياً 100%
          cat << 'EOF' > android/app/build.gradle
          plugins {
              id "com.android.application"
              id "org.jetbrains.kotlin.android"
              id "dev.flutter.flutter-gradle-plugin"
          }

          def localProperties = new Properties()
          def localPropertiesFile = rootProject.file('local.properties')
          if (localPropertiesFile.exists()) {
              localPropertiesFile.withReader('UTF-8') { reader ->
                  localProperties.load(reader)
              }
          }

          def flutterRoot = localProperties.getProperty('flutter.sdk')
          if (flutterRoot == null) {
              throw new GradleException("Flutter SDK not found. Define location with flutter.sdk in the local.properties file.")
          }

          android {
              namespace "com.judeadaiy.chat_app"
              compileSdkVersion 34

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = '17'
              }

              defaultConfig {
                  applicationId "com.judeadaiy.chat_app"
                  minSdkVersion 23
                  targetSdkVersion 34
                  versionCode 1
                  versionName "1.0.0"
              }
          }

          subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      project.android {
                          compileSdkVersion 34
                          buildToolsVersion "34.0.0"
                          defaultConfig {
                              minSdkVersion 23
                          }
                      }
                  }
              }
              project.tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
                  kotlinOptions {
                      jvmTarget = "17"
                  }
              }
          }
          EOF

          # د. إصلاح وحقن ملف MainActivity.kt لإنهاء مشكلة التوجيه وUnresolved reference نهائياً
          mkdir -p android/app/src/main/kotlin/com/judeadaiy/op
          cat << 'EOF' > android/app/src/main/kotlin/com/judeadaiy/op/MainActivity.kt
          package com.judeadaiy.op

          import io.flutter.embedding.android.FlutterActivity

          class MainActivity: FlutterActivity() {
          }
          EOF

      # 6. أمر البناء القياسي المباشر
      - name: Build APK Release
        run: |
          flutter build apk --release --no-tree-shake-icons --target-platform android-arm,android-arm64,android-x64

      # 7. رفع ملف الـ APK النهائي للتحميل
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: App-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk
