name: Build Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: false

      # 1. توليد مجلد أندرويد تلقائياً بالاعتماد على الاسم المكتوب في pubspec.yaml الخاص بك
      - name: Recreate Android Project Files
        run: |
          flutter create . --platforms=android --org=com.judeadaiy
          flutter pub get

      # 2. حقن إعدادات الـ SDK المطلوبة داخل ملف الخصائص بالسيرفر
      - name: Inject SDK Configurations
        run: |
          echo "flutter.compileSdkVersion=34" > android/local.properties
          echo "flutter.minSdkVersion=23" >> android/local.properties
          echo "flutter.targetSdkVersion=34" >> android/local.properties

      # 3. أمر البناء الفعلي النظيف (سيقرأ فلاتر الـ SDK 23 تلقائياً)
      - name: Build APK Release
        run: |
          flutter build apk --release --no-tree-shake-icons --target-platform android-arm,android-arm64,android-x64

      # 4. رفع ملف الـ APK النهائي للتحميل باسم مشروعك الأصلي
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: App-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk
