name: Pure Official Android Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. تثبيت الجافا المستقرة
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 2. تهيئة محرك فلاتر المستقر
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: false

      # 3. تأمين مسارات الموارد والخطوط الجديدة
      - name: Secure Fonts and Assets Directory
        run: |
          mkdir -p assets/images
          mkdir -p assets/fonts
          if [ ! -f "assets/images/app_logo.png" ]; then
            touch assets/images/app_logo.png
          fi
          if [ ! -f "assets/fonts/Cairo-Regular.ttf" ]; then
            touch assets/fonts/Cairo-Regular.ttf
          fi
          if [ ! -f "assets/fonts/Cairo-Bold.ttf" ]; then
            touch assets/fonts/Cairo-Bold.ttf
          fi
          if [ ! -f "assets/fonts/Cairo-SemiBold.ttf" ]; then
            touch assets/fonts/Cairo-SemiBold.ttf
          fi

      # 4. مسح المجلد القديم بالكامل للتخلص من أي تداخل في المسارات
      - name: Nuke Old Android Directory
        run: rm -rf android

      # 5. 🚨 التوليد الذكي والصافي: تحديد الـ org ليكون com.judeadaiy فقط لمنع تكرار المجلدات (op/op)
      - name: Core Flutter Android Generation
        run: flutter create . --platforms android --org com.judeadaiy

      # 6. تطهير كاش فلاتر وتحميل المكاتب المستقرة
      - name: Purge Flutter Cache & Fresh Pub Get
        run: |
          flutter pub cache clean -f
          flutter pub get

      # 7. ترقية نظام الجرادل الفرعي (Settings) ليتوافق مع كوتلن الحديث 1.8.22
      - name: Blueprint Android Settings Gradle
        run: |
          cat << 'EOF' > android/settings.gradle
          pluginManagement {
              def flutterSdkPath = {
                  def properties = new Properties()
                  def file = new File(rootProject.projectDir, "local.properties")
                  if (file.exists()) {
                      file.withReader("UTF-8") { reader -> properties.load(reader) }
                  }
                  def sdkPath = properties.getProperty("flutter.sdk")
                  if (sdkPath == null) {
                      throw new GradleException("flutter.sdk not set in local.properties")
                  }
                  return sdkPath
              }()

              includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          plugins {
              id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
              id "com.android.application" version "8.1.0" apply false
              id "org.jetbrains.kotlin.android" version "1.8.22" apply false
          }

          include ":app"
          EOF

      # 8. 🚨 تحديث الـ build.gradle ليتطابق مع هيكل الـ Package النظيف الجديد تماماً
      - name: Blueprint App Build Gradle
        run: |
          cat << 'EOF' > android/app/build.gradle
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }

          android {
              namespace "com.judeadaiy.chat_app"
              compileSdk = 34

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = "17"
              }

              defaultConfig {
                  applicationId "com.judeadaiy.chat_app"
                  minSdk = 23
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0.0"
              }

              buildTypes {
                  release {
                      signingConfig = signingConfigs.debug
                  }
              }
          }
          EOF

      # 9. ترقية الـ Gradle Wrapper ليتوافق مع أدوات أندرويد الحديثة
      - name: Upgrade Gradle Wrapper Version
        run: |
          cat << 'EOF' > android/gradle/wrapper/gradle-wrapper.properties
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-all.zip
          EOF

      # 10. تشغيل أداة الأيقونات لتوليد أيقونة الأندرويد الرسمية للمشروع النظيف
      - name: Run Launcher Icons Generator
        run: flutter pub run flutter_launcher_icons

      # 11. البناء الرسمي والمباشر للـ APK الصافي من الصفر
      - name: Build APK Release
        run: |
          flutter build apk --release --no-tree-shake-icons --target-platform android-arm,android-arm64,android-x64
          
      # 12. رفع ملف الـ APK النهائي النظيف تماماً
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Modern-Build
          path: build/app/outputs/flutter-apk/app-release.apk
