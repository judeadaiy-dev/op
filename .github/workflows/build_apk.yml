name: Force Build APK

on:
  push:
    branches: [ main ] # تأكدي من تطابق اسم الفرع
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Force Build APK
        # هذا الأمر يتجاهل التحذيرات ويجبر البناء للأندرويد فقط
        run: |
          flutter build apk --release --target-platform android-arm64 --no-tree-shake-icons --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: all-apks
          path: build/app/outputs/flutter-apk/*.apk
