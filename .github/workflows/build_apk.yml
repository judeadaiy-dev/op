name: Pure Native Flutter Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. تهيئة بيئة الجافا الحديثة والمستقرة
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 2. تهيئة محرك فلاتر المستقر
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: false

      # 3. تنظيف السيرفر من أي ملفات كاش قديمة مسببة للمشكلة
      - name: Clean Project Cache
        run: |
          flutter pub get
          flutter clean

      # 4. الحل الرسمي: إعادة توليد مجلد الأندرويد بأمر فلاتر القياسي المدعوم
      - name: Recreate Supported Android Project
        run: |
          rm -rf android
          flutter create . --platforms=android --org=com.judeadaiy

      # 5. تمرير إعدادات الـ SDK المطلوبة عبر الملف الرسمي local.properties
      - name: Configure Android SDK via Local Properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "flutter.compileSdkVersion=34" >> android/local.properties
          echo "flutter.minSdkVersion=23" >> android/local.properties
          echo "flutter.targetSdkVersion=34" >> android/local.properties

      # 6. البناء النظيف والنهائي
      - name: Build APK Release
        run: |
          flutter build apk --release --no-tree-shake-icons --target-platform android-arm,android-arm64,android-x64

      # 7. رفع ملف الـ APK النهائي للتحميل
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: App-ChatApp-Release
          path: build/app/outputs/flutter-apk/app-release.apk
