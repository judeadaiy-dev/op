name: Standard Build Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. تهيئة بيئة جافا المستقرة (JDK 17)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 2. تثبيت محرك فلاتر المستقر بالإصدار 3.22.0
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      # 3. حقن مسار الـ SDK فقط داخل ملف الخصائص (لأن الإعدادات الباقية بملفاتك جاهزة)
      - name: Configure SDK Path
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "android.useAndroidX=true" > android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties

      # 4. جلب المكتبات من الـ pubspec.yaml الخاص بك
      - name: Install Dependencies
        run: |
          flutter config --no-analytics
          flutter pub get

      # 5. البناء المباشر للمشروع بالاعتماد على ملفات الأندرويد التي جهزتها أنت
      - name: Build APK Release
        run: |
          flutter build apk --release \
            --target-platform android-arm,android-arm64,android-x64 \
            --no-tree-shake-icons

      # 6. رفع ملف الـ APK النهائي للتحميل
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: App-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk
