name: Pure Native Flutter Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. تهيئة بيئة الجافا المستقرة
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 2. تهيئة محرك فلاتر المستقر
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: false

      # 3. تنظيف السيرفر لجلب الحزم بشكل صحيح
      - name: Clean Project Cache
        run: |
          flutter pub get
          flutter clean

      # 4. إعادة توليد مجلد الأندرويد الأصلي المتوافق بالكامل مع فلاتر 3.22
      - name: Recreate Supported Android Project
        run: |
          rm -rf android
          flutter create . --platforms=android --org=com.judeadaiy

      # 5. التلقين الصارم: إجبار الجرادل على حقن إعدادات الـ SDK داخل كل المكاتب قبل معالجتها
      - name: Force Global SDK Settings on Plugins
        run: |
          # أ. ضبط ملف local.properties ومسارات الـ SDK للمشروع الأساسي
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "flutter.compileSdkVersion=34" >> android/local.properties
          echo "flutter.minSdkVersion=23" >> android/local.properties
          echo "flutter.targetSdkVersion=34" >> android/local.properties
          
          # ب. حقن كود برمجى ذكي وآمن في نهاية ملف android/app/build.gradle لفرض التوافق لـ connectivity_plus وغيرها
          cat << 'EOF' >> android/app/build.gradle

          subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      project.android {
                          compileSdkVersion 34
                          buildToolsVersion "34.0.0"
                          defaultConfig {
                              minSdkVersion 23
                              targetSdkVersion 34
                          }
                      }
                  }
              }
          }
          EOF

      # 6. البناء النظيف والنهائي
      - name: Build APK Release
        run: |
          flutter build apk --release --no-tree-shake-icons --target-platform android-arm,android-arm64,android-x64

      # 7. رفع ملف الـ APK النهائي للتحميل
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: App-ChatApp-Release
          path: build/app/outputs/flutter-apk/app-release.apk
