name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      # هذه الخطوة مهمة جداً لتعريف متغيرات البيئة للـ Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: flutter pub get
        
      - name: Build APK
        run: |
          flutter clean
          flutter build apk --release --split-per-abi --verbose

      - name: Locate and Upload APK
        run: |
          # العثور على أي ملف APK في مجلد المشروع ونسخه إلى مجلد الـ artifacts
          mkdir -p final_apk
          find build -name "*.apk" -exec cp {} final_apk/ \;
          ls -R final_apk/  # هذا الأمر سيعرض لنا الملفات التي وجدها في السجلات لنتأكد

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: final_apk/
