name: Smart Build Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. تهيئة بيئة جافا الحديثة (JDK 17) - تم إزالة الكاش لمنع توقف السيرفر عند غياب المجلد
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 2. تثبيت محرك فلاتر المستقر بالإصدار 3.22.0
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      # 3. مسح الهيكل القديم وبناء هيكل أندرويد نظيف ومعياري 100% من الصفر
      - name: Force Re-create Clean Android Structure
        run: |
          flutter config --no-analytics
          rm -rf android
          flutter create . --platforms=android --org=com.judeadaiy

      # 4. حقن وتثبيت قيم الـ SDK الصريحة في ملف الخصائص لتقرأها كل المكتبات الفرعية
      - name: Inject Complete SDK Paths
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "flutter.compileSdkVersion=34" >> android/local.properties
          echo "flutter.minSdkVersion=23" >> android/local.properties
          echo "flutter.targetSdkVersion=34" >> android/local.properties
          
          # تهيئة الذاكرة والـ AndroidX لمنع تعارض مكاتب Firebase والصوت
          echo "android.useAndroidX=true" > android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx3072m -XX:MaxMetaspaceSize=1024m" >> android/gradle.properties

      # 5. تعديل ملفات الجرادل برمجياً وبذكاء لفرض اسم الحزمة والتوافق الكامل لعام 2026
      - name: Patch Gradle and Application Configuration
        run: |
          # فرض إصدار كوتلن حديث متوافق مع المكاتب في الملف الرئيسي
          if [ -f android/build.gradle ]; then
            sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.24"/g' android/build.gradle
            sed -i 's/kotlin("android") version .*/kotlin("android") version "1.9.24"/g' android/build.gradle
          fi

          # تعديل قيم الـ SDK واسم الحزمة في ملف التطبيق الداخلي تلقائياً دون تدمير الهيكلية المعيارية
          if [ -f android/app/build.gradle ]; then
            sed -i 's/minSdkVersion .*/minSdkVersion 23/g' android/app/build.gradle
            sed -i 's/targetSdkVersion .*/targetSdkVersion 34/g' android/app/build.gradle
            sed -i 's/compileSdkVersion .*/compileSdkVersion 34/g' android/app/build.gradle
            sed -i 's/applicationId .*/applicationId "com.judeadaiy.chat_app"/g' android/app/build.gradle
            sed -i 's/namespace .*/namespace "com.judeadaiy.chat_app"/g' android/app/build.gradle
          fi

      # 6. جلب المكتبات والحزم لتتطابق مع الهيكل المحدث والمصلح
      - name: Install Dependencies
        run: |
          flutter pub get

      # 7. البناء الذكي والنهائي للمنصات المستهدفة
      - name: Build APK Release
        run: |
          flutter build apk --release \
            --target-platform android-arm,android-arm64,android-x64 \
            --no-tree-shake-icons

      # 8. رفع ملف الـ APK النهائي للتحميل مباشرة من الـ Artifacts
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: App-Latest-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk
