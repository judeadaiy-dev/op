name: Build Flutter APK

on:
  push:
    branches:
      - main # أو master حسب اسم الفرع الرئيسي في مستودعك الجديد
  workflow_dispatch: # يتيح لك تشغيل البناء يدوياً بضغطة زر من الموقع

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب كود المشروع من الغيت هاب
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. تثبيت لغة الجافا الضرورية لبناء الأندرويد
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. تثبيت بيئة فلاتر سحابياً
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      # 4. توليد مجلد الأندرويد تلقائياً بربطه باسم الحزمة الصحيح المتوافق مع الـ pubspec
      - name: Recreate Android platform files
        run: |
          flutter create . --platforms=android --project-name=chat_app

      # 5. جلب الحزم والمكتبات المذكورة في pubspec.yaml
      - name: Install dependencies
        run: |
          flutter pub get

      # 6. بناء نسخة الـ APK الاحترافية (Release)
      - name: Build APK
        run: |
          flutter build apk --release --no-tree-shake-icons

      # 7. رفع الـ APK الناتج لتستطيع تحميله مباشرة إلى هاتفك
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk
