name: Standard Build Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. تهيئة بيئة جافا الحديثة والمستقرة (JDK 17)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 2. تثبيت محرك فلاتر المستقر بالإصدار 3.22.0
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      # 3. الحل القاطع: جعل فلاتر ينشئ قالب أندرويد المعياري الكامل والمدعوم رسميًا لتخطي الفحص
      - name: Generate Supported Android Structure
        run: |
          flutter config --no-analytics
          # مسح المجلد اليدوي لإنشاء الهيكل الرسمي المدعوم بالكامل
          rm -rf android
          flutter create . --platforms=android --org=com.judeadaiy

      # 4. حقن مسار الـ SDK والإصدارات الصريحة داخل ملفات الخصائص لتقرأها كل الحزم
      - name: Configure SDK and Gradle Properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "flutter.compileSdkVersion=34" >> android/local.properties
          echo "flutter.minSdkVersion=23" >> android/local.properties
          echo "flutter.targetSdkVersion=34" >> android/local.properties
          
          # تهيئة الذاكرة ونظام الـ AndroidX ومنع تعارض مكاتب Firebase والصوت
          echo "android.useAndroidX=true" > android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx3072m -XX:MaxMetaspaceSize=1024m" >> android/gradle.properties

      # 5. ضبط إعدادات الجافا والكوتلن الحديثة داخل ملف build.gradle الافتراضي لضمان التوافق كلياً
      - name: Patch Application Gradle for Java 17 Compatibility
        run: |
          if [ -f android/app/build.gradle ]; then
            # فرض قيم الـ SDK الصريحة واسم الحزمة المطلوبة لتطبيقك
            sed -i 's/minSdkVersion .*/minSdkVersion 23/g' android/app/build.gradle
            sed -i 's/targetSdkVersion .*/targetSdkVersion 34/g' android/app/build.gradle
            sed -i 's/compileSdkVersion .*/compileSdkVersion 34/g' android/app/build.gradle
            
            # توحيد جافا 17 للكوتلن والجافا لمنع خطأ الـ JVM target المتعارض مع المكتبات الحديثة
            sed -i 's/sourceCompatibility .*/sourceCompatibility JavaVersion.VERSION_17/g' android/app/build.gradle
            sed -i 's/targetCompatibility .*/targetCompatibility JavaVersion.VERSION_17/g' android/app/build.gradle
            sed -i 's/jvmTarget = .*/jvmTarget = "17"/g' android/app/build.gradle
          fi

      # 6. جلب المكتبات من الـ pubspec.yaml الخاص بك
      - name: Install Dependencies
        run: |
          flutter pub get

      # 7. البناء المباشر المستقر بالاعتماد على الهيكل الرسمي المدعوم
      - name: Build APK Release
        run: |
          flutter build apk --release \
            --target-platform android-arm,android-arm64,android-x64 \
            --no-tree-shake-icons

      # 8. رفع ملف الـ APK النهائي للتحميل مباشرة من الـ Artifacts
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: App-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk
