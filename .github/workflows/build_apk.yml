name: The Final Decisive Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. تثبيت الجافا المتوافقة تماماً مع الجرادل الحديث
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 2. محرك فلاتر (الإصدار المستقر)
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: false

      # 3. تنظيف وتجهيز الحزم
      - name: Install Dependencies
        run: |
          flutter pub get
          flutter clean
          flutter pub get

      # 4. بناء مجلد أندرويد نقي من الصفر
      - name: Recreate Safe Android Skeleton
        run: |
          rm -rf android
          flutter create . --platforms=android --org=com.judeadaiy

      # 5. الضربة القاضية: إجبار السيرفر على استخدام Gradle 8.0 بدلاً من 7.6.3
      - name: Force Gradle 8.0 Wrapper
        run: |
          mkdir -p android/gradle/wrapper
          cat << 'EOF' > android/gradle/wrapper/gradle-wrapper.properties
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-all.zip
          EOF

      # 6. حقن ملف الإعدادات لتعريف مكتبات فلاتر للمكتبات الخارجية
      - name: Inject Master settings.gradle
        run: |
          cat << 'EOF' > android/settings.gradle
          pluginManagement {
              def flutterSdkPath = {
                  def properties = new Properties()
                  def propertiesFile = new File(settingsDir, 'local.properties')
                  if (propertiesFile.exists()) {
                      propertiesFile.withReader('UTF-8') { reader -> properties.load(reader) }
                  }
                  def sdkPath = properties.getProperty('flutter.sdk')
                  assert sdkPath != null, "flutter.sdk not set in local.properties"
                  return sdkPath
              }()
              includeBuild "$flutterSdkPath/packages/flutter_tools/gradle"
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          plugins {
              id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
              id "com.android.application" version "8.0.2" apply false
              id "org.jetbrains.kotlin.android" version "1.8.22" apply false
          }
          include ":app"
          EOF

      # 7. حقن ملف البناء الرئيسي
      - name: Inject Master build.gradle
        run: |
          cat << 'EOF' > android/build.gradle
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
              project.evaluationDependsOn(':app')
          }
          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          EOF

      # 8. حقن ملف التطبيق الداخلي المتوافق مع الإصدار 8.0 (استخدام compileSdk الحديثة)
      - name: Inject App build.gradle
        run: |
          cat << 'EOF' > android/app/build.gradle
          plugins {
              id "com.android.application"
              id "org.jetbrains.kotlin.android"
              id "dev.flutter.flutter-gradle-plugin"
          }
          android {
              namespace "com.judeadaiy.chat_app"
              compileSdk 34
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions {
                  jvmTarget = '17'
              }
              defaultConfig {
                  applicationId "com.judeadaiy.chat_app"
                  minSdk 23
                  targetSdk 34
                  versionCode 1
                  versionName "1.0.0"
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                  }
              }
          }
          EOF

      # 9. تأمين مسارات الـ SDK لكي لا تتوه المكتبات
      - name: Configure Android SDK Properties
        run: |
          cat << 'EOF' > android/local.properties
          sdk.dir=/usr/local/lib/android/sdk
          flutter.sdk=/opt/hostedtoolcache/flutter/stable-3.22.0-x64/flutter
          flutter.compileSdkVersion=34
          flutter.minSdkVersion=23
          flutter.targetSdkVersion=34
          EOF

      # 10. تفعيل دعم AndroidX
      - name: Ensure AndroidX Properties
        run: |
          echo "android.useAndroidX=true" > android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties

      # 11. إضافة جميع الصلاحيات اللازمة لتطبيق الدردشة (صوت، كاميرا، تخزين)
      - name: Fix Android Manifest File
        run: |
          cat << 'EOF' > android/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.judeadaiy.chat_app">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <application
                  android:label="Chat App"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher">
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|screenLayout|density|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      # 12. أمر البناء النهائي النظيف للـ APK
      - name: Build APK Release
        run: |
          flutter build apk --release --no-tree-shake-icons --target-platform android-arm,android-arm64,android-x64

      # 13. استخراج الجوهرة ورفع الـ APK للتحميل
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: App-ChatApp-Release
          path: build/app/outputs/flutter-apk/app-release.apk
