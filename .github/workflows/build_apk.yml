name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

# هذه الإضافة تمنع تداخل عمليات البناء
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: flutter pub get
        
      - name: Build APK
        run: |
          flutter clean
          flutter build apk --release --split-per-abi --no-daemon --quiet

      - name: Locate and Upload APK
        run: |
          mkdir -p final_apk
          find . -name "*.apk" -exec cp {} final_apk/ \;
          ls -R final_apk/

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: final_apk/
