name: Build Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Recreate Android platform files
        run: |
          flutter create . --platforms=android --project-name=chat_app

      - name: Patch Android build configuration
        run: |
          echo "flutter.compileSdkVersion=34" >> android/local.properties
          echo "flutter.minSdkVersion=21" >> android/local.properties
          echo "flutter.targetSdkVersion=34" >> android/local.properties

      # الخطوة الاحترافية: إجبار السيرفر على ربط واستكشاف كل الاستدعاءات المحلية تلقائياً
      - name: Resolve and Repair Packages
        run: |
          flutter pub get
          flutter pub pub cache repair

      - name: Build APK
        run: |
          flutter build apk --release --no-tree-shake-icons
  
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk
