name: Pure Official Android Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. تثبيت الجافا المستقرة
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 2. تهيئة محرك فلاتر المستقر
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: false

      # 3. تأمين مسارات الموارد والخطوط
      - name: Secure Fonts and Assets Directory
        run: |
          mkdir -p assets/images
          mkdir -p assets/fonts
          if [ ! -f "assets/images/app_logo.png" ]; then
            touch assets/images/app_logo.png
          fi
          if [ ! -f "assets/fonts/Cairo-Regular.ttf" ]; then
            touch assets/fonts/Cairo-Regular.ttf
          fi
          if [ ! -f "assets/fonts/Cairo-Bold.ttf" ]; then
            touch assets/fonts/Cairo-Bold.ttf
          fi
          if [ ! -f "assets/fonts/Cairo-SemiBold.ttf" ]; then
            touch assets/fonts/Cairo-SemiBold.ttf
          fi

      # 4. مسح المجلد القديم لضمان النظافة الكاملة
      - name: Nuke Old Android Directory
        run: rm -rf android

      # 5. Tالتوليد الرسمي والنظيف لمجلد الأندرويد الحديث
      - name: Core Flutter Android Generation
        run: flutter create . --platforms android --org com.judeadaiy

      # 6. تطهير كاش فلاتر وتحميل المكاتب المستقرة
      - name: Purge Flutter Cache & Fresh Pub Get
        run: |
          flutter pub cache clean -f
          flutter pub get

      # 7. 🚨 الحل الهندسي النظيف: حقن ملف build.gradle رسمي وثابت يفرض minSdkVersion 23 بدون ترقيع نصوص
      - name: Blueprint App Build Gradle
        run: |
          cat << 'EOF' > android/app/build.gradle
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }

          android {
              namespace "com.judeadaiy.op"
              compileSdk = 34

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = "17"
              }

              defaultConfig {
                  applicationId "com.judeadaiy.op"
                  minSdk = 23
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0.0"
              }

              buildTypes {
                  release {
                      signingConfig = signingConfigs.debug
                  }
              }
          }
          EOF

      # 8. تشغيل أداة الأيقونات لتوليد أيقونة الأندرويد الرسمية
      - name: Run Launcher Icons Generator
        run: flutter pub run flutter_launcher_icons

      # 9. البناء الرسمي والمباشر للـ APK
      - name: Build APK Release
        run: |
          cd android && ./gradlew clean && cd ..
          flutter build apk --release --no-tree-shake-icons --target-platform android-arm,android-arm64,android-x64
          
      # 10. رفع ملف الـ APK النهائي للتحميل المباشر
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Modern-Build
          path: build/app/outputs/flutter-apk/app-release.apk
