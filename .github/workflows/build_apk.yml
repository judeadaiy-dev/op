name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Build
        run: |
          flutter clean
          flutter pub get
          flutter build apk --release --split-per-abi
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          # هذا هو المسار الذي يضع فيه Flutter ملفات الـ APK عادةً
          path: build/app/outputs/flutter-apk/MyFinalApp.apk
