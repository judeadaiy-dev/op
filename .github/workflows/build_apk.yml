name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Build APK
        run: |
          flutter clean
          flutter pub get
          flutter build apk --release --split-per-abi --verbose
          
      - name: Check and Move Files
        run: |
          # 1. ننشئ المجلد أولاً
          mkdir -p final_apk
          
          # 2. نبحث عن الملفات وننسخها، وإذا لم يجد شيئاً سيطبع رسالة ولن يوقف البناء
          find build -name "*.apk" -exec cp {} final_apk/ \; || echo "No APK found"
          
          # 3. نعرض ما وجدناه لنتأكد في السجلات
          echo "Files in final_apk:"
          ls -R final_apk/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: final_apk/


