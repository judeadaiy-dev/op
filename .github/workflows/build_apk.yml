name: Smart Build Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. تهيئة بيئة الجافا الحديثة
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 2. تهيئة محرك فلاتر المستقر
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: false

      # 3. جلب الحزم والمكتبات
      - name: Install Dependencies
        run: flutter pub get

      # 4. توليد هيكل أندرويد تلقائياً بالاعتماد على مشروعك
      - name: Auto-Generate Android Structure
        run: |
          flutter create . --platforms=android --org=com.judeadaiy

      # 5. الحل القاطع: حقن الإعدادات مع مسار الـ Flutter SDK الحقيقي للسيرفر
      - name: Inject Correct SDK Paths
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "flutter.compileSdkVersion=34" >> android/local.properties
          echo "flutter.minSdkVersion=23" >> android/local.properties
          echo "flutter.targetSdkVersion=34" >> android/local.properties

      # 6. تحديث الجرادل الآن بأمان بعد تأمين كافة المسارات والنواقص
      - name: Update Build Tools to Latest Compatible Versions
        run: |
          cd android
          ./gradlew wrapper --gradle-version 8.4
          cd ..

      # 7. أمر البناء الصريح والنظيف
      - name: Build APK Release
        run: |
          flutter build apk --release --no-tree-shake-icons --target-platform android-arm,android-arm64,android-x64

      # 8. رفع ملف الـ APK النهائي للتحميل
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: App-Latest-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk
