name: Smart Build Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. تهيئة بيئة جافا الحديثة والمستقرة (JDK 17)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 2. تثبيت محرك فلاتر المستقر بالإصدار 3.22.0
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      # 3. بناء هيكل أندرويد نظيف كلياً من السيرفر
      - name: Force Re-create Clean Android Structure
        run: |
          flutter config --no-analytics
          rm -rf android
          flutter create . --platforms=android --org=com.judeadaiy

      # 4. التعديل الجذري وحقن الكود الكلاسيكي المتوافق مع المكاتب لتعريف متغير flutter
      - name: Patch Android Project For Plus Plugins Compatibility
        run: |
          # تحديث وإعادة صياغة ملف android/build.gradle بالكامل ليحتوي على التوزيعة الصحيحة للمكاتب
          cat << 'EOF' > android/build.gradle
          buildscript {
              ext.kotlin_version = '1.9.24'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.1'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
          }
          subprojects {
              project.evaluationDependsOn(':app')
          }

          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          EOF

          # إصلاح ملف settings.gradle ليتكامل مع البناء الكلاسيكي بدلاً من الـ DSL المقفل
          cat << 'EOF' > android/settings.gradle
          include ':app'

          def localProperties = new Properties()
          def localPropertiesFile = new File(rootProject.projectDir, "local.properties")
          if (localPropertiesFile.exists()) {
              localPropertiesFile.withReader('UTF-8') { reader ->
                  localProperties.load(reader)
              }
          }

          def flutterSdkPath = localProperties.getProperty('flutter.sdk')
          if (flutterSdkPath == null) {
              throw new GradleException("Flutter SDK not found. Define location with flutter.sdk in the local.properties file.")
          }

          includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")
          EOF

      # 5. حقن وتثبيت قيم الـ SDK الصريحة في ملف الخصائص لإنهاء خطأ compileSdkVersion المفقود
      - name: Inject Complete SDK Paths
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "flutter.compileSdkVersion=34" >> android/local.properties
          echo "flutter.minSdkVersion=23" >> android/local.properties
          echo "flutter.targetSdkVersion=34" >> android/local.properties
          
          # تهيئة الذاكرة والـ AndroidX لمنع تعارض مكاتب Firebase والصوت
          echo "android.useAndroidX=true" > android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx3072m -XX:MaxMetaspaceSize=1024m" >> android/gradle.properties

      # 6. تحديث إصدار الـ Gradle Wrapper تلقائياً لتخطي قيد إصدار 7.6.3 حل المشكلة الحالي
      - name: Upgrade Gradle Wrapper Version
        run: |
          if [ -f android/gradle/wrapper/gradle-wrapper.properties ]; then
            sed -i 's/gradle-.*-all.zip/gradle-8.2-all.zip/g' android/gradle/wrapper/gradle-wrapper.properties
          fi

      # 7. تعديل ملف التطبيق الداخلي لفرض التحديثات وتجنب التعارضات
      - name: Patch Application Configuration
        run: |
          if [ -f android/app/build.gradle ]; then
            sed -i 's/minSdkVersion .*/minSdkVersion 23/g' android/app/build.gradle
            sed -i 's/targetSdkVersion .*/targetSdkVersion 34/g' android/app/build.gradle
            sed -i 's/compileSdkVersion .*/compileSdkVersion 34/g' android/app/build.gradle
            sed -i 's/applicationId .*/applicationId "com.judeadaiy.chat_app"/g' android/app/build.gradle
            sed -i 's/namespace .*/namespace "com.judeadaiy.chat_app"/g' android/app/build.gradle
          fi

      # 8. جلب المكتبات والحزم لتتطابق مع الهيكل المعياري الجديد
      - name: Install Dependencies
        run: |
          flutter pub get

      # 9. البناء النهائي المستقر وتوليد ملف الـ APK
      - name: Build APK Release
        run: |
          flutter build apk --release \
            --target-platform android-arm,android-arm64,android-x64 \
            --no-tree-shake-icons

      # 10. رفع ملف الـ APK النهائي للتحميل مباشرة من الـ Artifacts
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: App-Latest-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk

