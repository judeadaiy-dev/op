name: Pure Official Android Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. تثبيت الجافا المستقرة
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 2. تهيئة محرك فلاتر المستقر (تعطيل الكاش هنا لضمان عدم سحب المكاتب المعطوبة)
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: false

      # 3. تأمين مسارات الموارد والخطوط لضمان دمجها
      - name: Secure Fonts and Assets Directory
        run: |
          mkdir -p assets/images
          mkdir -p assets/fonts
          if [ ! -f "assets/images/app_logo.png" ]; then
            touch assets/images/app_logo.png
          fi
          if [ ! -f "assets/fonts/Cairo-Regular.ttf" ]; then
            touch assets/fonts/Cairo-Regular.ttf
          fi
          if [ ! -f "assets/fonts/Cairo-Bold.ttf" ]; then
            touch assets/fonts/Cairo-Bold.ttf
          fi
          if [ ! -f "assets/fonts/Cairo-SemiBold.ttf" ]; then
            touch assets/fonts/Cairo-SemiBold.ttf
          fi

      # 4. مسح المجلد القديم التالف تماماً
      - name: Nuke Old Android Directory
        run: rm -rf android

      # 5. التوليد الرسمي والنظيف للأندرويد الحديث بنظام الـ Plugins الجديد
      - name: Core Flutter Android Generation
        run: |
          flutter create . --platforms android --org com.judeadaiy
          
      # 6. 🚨 الحل الهندسي: تطهير كاش فلاتر وتحميل مكاتب نقية ومحدثة 100%
      - name: Purge Flutter Cache & Fresh Pub Get
        run: |
          flutter pub cache clean -f
          flutter pub get

      # 7. تشغيل أداة الأيقونات لتوليد أيقونة الأندرويد الرسمية
      - name: Run Launcher Icons Generator
        run: flutter pub run flutter_launcher_icons

      # 8. 🚨 البناء الاحترافي الصارم: حصر التجميع لمنصة الأندرويد وتخطي تجميع مكاتب الويب واللينكس الوهمية
      - name: Build APK Release
        run: |
          flutter build apk --release --no-tree-shake-icons --target-platform android-arm,android-arm64,android-x64
          
      # 9. رفع ملف الـ APK النهائي النظيف تماماً
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Modern-Build
          path: build/app/outputs/flutter-apk/app-release.apk
