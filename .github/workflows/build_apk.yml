name: Smart Build Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. تهيئة بيئة جافا الحديثة (JDK 17)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 2. تثبيت محرك فلاتر المستقر بالإصدار 3.22.0
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      # 3. بناء هيكل أندرويد نظيف
      - name: Force Re-create Clean Android Structure
        run: |
          flutter config --no-analytics
          rm -rf android
          flutter create . --platforms=android --org=com.judeadaiy

      # 4. إصلاح ملف الجرادل الرئيسي برمجياً وإرجاعه للنظام الكلاسيكي المتوافق مع كل المكاتب
      - name: Overwrite with Classic Compatible Gradle
        run: |
          # إعادة كتابة ملف android/build.gradle بالكامل بالطريقة التي تفهمها المكاتب الفرعية
          cat << 'EOF' > android/build.gradle
          buildscript {
              ext.kotlin_version = '1.9.24'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.1'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
          }
          subprojects {
              project.evaluationDependsOn(':app')
          }

          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          EOF

      # 5. حقن وتثبيت قيم الـ SDK الصريحة في ملف الخصائص
      - name: Inject Complete SDK Paths
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "flutter.compileSdkVersion=34" >> android/local.properties
          echo "flutter.minSdkVersion=23" >> android/local.properties
          echo "flutter.targetSdkVersion=34" >> android/local.properties
          
          # تهيئة الذاكرة والـ AndroidX لمنع تعارض مكاتب Firebase والصوت
          echo "android.useAndroidX=true" > android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx3072m -XX:MaxMetaspaceSize=1024m" >> android/gradle.properties

      # 6. تعديل ملف التطبيق الداخلي ليتوافق مع الملف الرئيسي الكلاسيكي
      - name: Patch Application Configuration
        run: |
          if [ -f android/app/build.gradle ]; then
            sed -i 's/minSdkVersion .*/minSdkVersion 23/g' android/app/build.gradle
            sed -i 's/targetSdkVersion .*/targetSdkVersion 34/g' android/app/build.gradle
            sed -i 's/compileSdkVersion .*/compileSdkVersion 34/g' android/app/build.gradle
            sed -i 's/applicationId .*/applicationId "com.judeadaiy.chat_app"/g' android/app/build.gradle
            sed -i 's/namespace .*/namespace "com.judeadaiy.chat_app"/g' android/app/build.gradle
          fi

      # 7. جلب المكتبات والحزم لتتطابق مع الهيكل المحدث والمصلح
      - name: Install Dependencies
        run: |
          flutter pub get

      # 8. البناء الذكي والنهائي للمنصات المستهدفة
      - name: Build APK Release
        run: |
          flutter build apk --release \
            --target-platform android-arm,android-arm64,android-x64 \
            --no-tree-shake-icons

      # 9. رفع ملف الـ APK النهائي للتحميل مباشرة من الـ Artifacts
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: App-Latest-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk
