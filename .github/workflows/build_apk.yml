name: Build Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: false

      # 1. توليد مجلد أندرويد تلقائياً بالاعتماد على الاسم الحقيقي لمشروعك
      - name: Recreate Android Project Files
        run: |
          flutter create . --platforms=android --org=com.judeadaiy
          flutter pub get

      # 2. حقن إعدادات الـ SDK المطلوبة داخل ملف الخصائص بالسيرفر
      - name: Inject SDK Configurations
        run: |
          echo "flutter.compileSdkVersion=34" > android/local.properties
          echo "flutter.minSdkVersion=23" >> android/local.properties
          echo "flutter.targetSdkVersion=34" >> android/local.properties

      # 3. الحل القاطع والمباشر: فرض تحديث الجرادل والكوتلن داخل ملف settings.gradle المولد
      - name: Force Modern Gradle and Kotlin Plugins
        run: |
          cat << 'EOF' > android/settings.gradle
          pluginManagement {
              def flutterSdkPath = {
                  def properties = new Properties()
                  def file = new File(settingsDir, "local.properties")
                  if (file.exists()) {
                      properties.load(file.newDataInputStream())
                  }
                  def sdkPath = properties.getProperty("flutter.sdk")
                  assert sdkPath != null, "flutter.sdk not set in local.properties"
                  return sdkPath
              }()

              includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          plugins {
              id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
              id "com.android.application" version "8.1.0" apply false
              id "org.jetbrains.kotlin.android" version "1.9.20" apply false
          }

          include ":app"
          EOF

          # تأكيد ضبط الـ minSdkVersion داخل ملف التطبيق الداخلي
          APP_GRADLE="android/app/build.gradle"
          sed -i 's/minSdkVersion.*/minSdkVersion 23/g' $APP_GRADLE 2>/dev/null || true

      # 4. أمر البناء القياسي والنظيف (بدون استخدام حيل الإجبار)
      - name: Build APK Release
        run: |
          flutter build apk --release --no-tree-shake-icons --target-platform android-arm,android-arm64,android-x64

      # 5. رفع ملف الـ APK النهائي للتحميل
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: App-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk
