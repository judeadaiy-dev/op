name: Modern Build Flutter APK 2026

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. تهيئة بيئة جافا الحديثة المتوافقة كلياً (JDK 17)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 2. تثبيت محرك فلاتر الحديث بالإصدار المستقر 3.22.0
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      # 3. بناء هيكل أندرويد حديث 100% بأحدث نظام قالب من فلاتر
      - name: Re-create Modern Android Structure
        run: |
          flutter config --no-analytics
          rm -rf android
          flutter create . --platforms=android --org=com.judeadaiy

      # 4. حقن قيم الـ SDK الحديثة في ملف الخصائص
      - name: Inject Modern SDK Paths
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "flutter.compileSdkVersion=34" >> android/local.properties
          echo "flutter.minSdkVersion=23" >> android/local.properties
          echo "flutter.targetSdkVersion=34" >> android/local.properties
          
          # تهيئة إعدادات الذاكرة ونظام الـ AndroidX
          echo "android.useAndroidX=true" > android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx3072m -XX:MaxMetaspaceSize=1024m" >> android/gradle.properties

      # 5. الحل الحديث والجذري: إجبار الجرادل على توحيد الجافا (JVM 17) لجميع المكتبات لعام 2026
      - name: Force Java 17 Globally on All Plugins
        run: |
          # حقن كود ذكي في ملف android/app/build.gradle لتوحيد مترجم الجافا والكوتلن على إصدار 17 لجميع الحزم
          cat << 'EOF' >> android/app/build.gradle

          // توحيد إصدار الجافا لجميع المكتبات الفرعية والمشاريع المشتركة لمنع تعارض الـ JVM
          subprojects {
              project.tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
                  kotlinOptions {
                      jvmTarget = "17"
                  }
              }
              project.tasks.withType(JavaCompile).configureEach {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }
          }
          EOF

      # 6. جلب المكتبات والحزم الحديثة من ملف الـ pubspec.yaml الخاص بك
      - name: Install Dependencies
        run: |
          flutter pub get

      # 7. البناء الذكي والنهائي للمنصات المستهدفة (بأحدث نظام)
      - name: Build APK Release
        run: |
          flutter build apk --release \
            --target-platform android-arm,android-arm64,android-x64 \
            --no-tree-shake-icons

      # 8. رفع ملف الـ APK النهائي للتحميل
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: App-Modern-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk
