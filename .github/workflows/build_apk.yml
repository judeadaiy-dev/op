name: Auto Repair Gradle & Native Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. تثبيت الجافا المستقرة
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 2. تهيئة محرك فلاتر المستقر
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: false

      # 3. تأمين مسارات الصور والمجلدات لـ pubspec
      - name: Secure Assets and Icon
        run: |
          mkdir -p assets/images
          if [ ! -f "assets/images/app_logo.png" ]; then
            touch assets/images/app_logo.png
          fi

      # 4. جلب المكاتب
      - name: Install Dependencies
        run: flutter pub get

      # 5. السحر الحقيقي: إجبار فلاتر على توليد ملف gradw وملفات الأندرويد الناقصة تلقائياً وبشكل متوافق
      - name: Auto Generate Missing Android Wrappers
        run: |
          flutter create . --platforms android
          flutter pub get

      # 6. بناء جسر الـ SDK وضبط ملف local.properties في المسار المولد
      - name: Configure Android SDK & Gradle Bridge
        run: |
          cat << 'EOF' > android/local.properties
          sdk.dir=/usr/local/lib/android/sdk
          flutter.sdk=/opt/hostedtoolcache/flutter/stable-3.22.0-x64/flutter
          flutter.compileSdkVersion=34
          flutter.minSdkVersion=23
          flutter.targetSdkVersion=34
          EOF

      # 7. أمر البناء المباشر بعد استعادة الملفات المفقودة
      - name: Build APK Release
        run: |
          flutter build apk --release --no-tree-shake-icons --target-platform android-arm,android-arm64,android-x64

      # 8. رفع الـ APK الجاهز والمكتمل بنجاح
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk
