name: Ultimate Pristine Android Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. تثبيت بيئة الجافا المستقرة (JDK 17) المطلوبة لأندرويد الحديث
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 2. تهيئة محرك فلاتر المستقر في السيرفر
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: false

      # 3. تأمين مسارات الموارد والخطوط لضمان دمجها داخل الـ APK بنجاح
      - name: Secure Fonts and Assets Directory
        run: |
          mkdir -p assets/images
          mkdir -p assets/fonts
          if [ ! -f "assets/images/app_logo.png" ]; then
            touch assets/images/app_logo.png
          fi
          if [ ! -f "assets/fonts/Cairo-Regular.ttf" ]; then
            touch assets/fonts/Cairo-Regular.ttf
          fi
          if [ ! -f "assets/fonts/Cairo-Bold.ttf" ]; then
            touch assets/fonts/Cairo-Bold.ttf
          fi
          if [ ! -f "assets/fonts/Cairo-SemiBold.ttf" ]; then
            touch assets/fonts/Cairo-SemiBold.ttf
          fi

      # 4. تدمير مجلد أندرويد القديم المرفوع من الهاتف بالكامل لضمان عدم وجود ملفات معطوبة
      - name: Nuke Old Android Directory
        run: rm -rf android

      # 5. التوليد الرسمي: نأمر فلاتر بخلق بيئة أندرويد كاملة وجديدة متوافقة مع مكاتبك
      # سيقوم فلاتر بضبط الـ Namespace والـ Gradle والـ MainActivity تلقائياً وبأعلى كفاءة رسمية
      - name: Core Flutter Android Generation
        run: |
          flutter create . --platforms android --org com.judeadaiy
          flutter pub get

      # 6. تشغيل أداة الأيقونات (ستقرأ ملف الـ pubspec النظيف للأندرويد وتعمل فوراً)
      - name: Run Launcher Icons Generator
        run: flutter pub run flutter_launcher_icons

      # 7. البناء الصافي والمباشر دون أي تعديل أو عبث خارجي بالأكواد
      - name: Build APK Release
        run: flutter build apk --release --no-tree-shake-icons --target-platform android-arm,android-arm64,android-x64

      # 8. استخراج الـ APK النهائي الكامل لتقوم بتحميله على جوالك
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Official-Build
          path: build/app/outputs/flutter-apk/app-release.apk
