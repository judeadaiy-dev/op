name: chat_app
description: تطبيق محادثة احترافي بـ Flutter و Supabase
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Backend
  supabase_flutter: ^2.6.0
  
  # Firebase - للإشعارات Push Notifications
  firebase_core: ^4.9.0
  firebase_messaging: ^16.2.2
  flutter_local_notifications: ^21.0.0

  # UI & Theme
  google_fonts: ^8.1.0
  glassmorphism: ^3.0.0
  flutter_animate: ^4.5.0

  # Images & Files
  image_picker: ^1.1.0
  cached_network_image: ^3.3.1
  
  # Utils
  intl: ^0.20.2
  timeago: ^3.6.1
  uuid: ^4.3.3
  
  # Permissions - للمايك والكاميرا والتخزين
  permission_handler: ^12.0.2
  
  # Audio Recording & Player 
  record: ^7.0.0
  just_audio: ^0.10.5
  
  # File Picker & Path
  file_picker: ^8.0.3
  path_provider: ^2.1.3
  
  # Connectivity
  connectivity_plus: ^7.1.1

# 🚨 الضربة القاضية: إجبار فلاتر على استخدام نسخة واجهة مستقرة قديمة متوافقة لا تطلب startStream
dependency_overrides:
  record_platform_interface: 1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # توليد الأيقونة بكل المقاسات
  flutter_launcher_icons: ^0.14.0

# إعدادات الأيقونة للأندرويد فقط وحذف الـ ios تماماً
flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/images/app_logo.png"
  min_sdk_android: 23
  adaptive_icon_background: "#1E88E5"
  adaptive_icon_foreground: "assets/images/app_logo.png"

flutter:
  uses-material-design: true

  # مسار الصور
  assets:
    - assets/images/app_logo.png

  # مسارات الخطوط لضمان دمجها داخل الـ APK بنجاح
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
          dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: "^0.13.1"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png" # ضع أيقونتك في هذا المسار
  min_sdk_android: 23

