name: chat_app
description: تطبيق محادثة احترافي بـ Flutter و Supabase
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Backend
  supabase_flutter: ^2.5.6

  # UI & Theme
  google_fonts: ^6.2.1
  glassmorphism: ^3.0.0
  flutter_animate: ^4.5.0

  # Images & Files
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  
  # Utils
  intl: ^0.19.0
  timeago: ^3.6.1
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  # الخطوط
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600

  assets:
    - assets/images/
