name: chat_app
description: تطبيق محادثة احترافي بـ Flutter و Supabase
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Backend (جعلناها مرنة لتختار المتوافق مع دارت 3.4.0)
  supabase_flutter: any
  
  # Firebase - مصفوفة الإصدار المتوافق تلقائياً
  firebase_core: any
  firebase_messaging: any
  flutter_local_notifications: any

  # UI & Theme
  google_fonts: any
  glassmorphism: ^3.0.0
  flutter_animate: any

  # Images & Files
  image_picker: any
  cached_network_image: any
  
  # Utils
  intl: any
  timeago: any
  uuid: any
  
  # Permissions
  permission_handler: any
  
  # Audio Recording - النسخة الحديثة المتوافقة
  record: any
  
  # Audio Player - تم فتح الإصدار لتتجنب شرط دارت الحديث
  just_audio: any
  
  # File Picker
  file_picker: any
  
  # Path
  path_provider: any
  
  # Connectivity
  connectivity_plus: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  
  # توليد الأيقونة بكل المقاسات
  flutter_launcher_icons: ^0.14.0

# إعدادات الأيقونة
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_logo.png"
  min_sdk_android: 23
  remove_alpha_ios: true
  adaptive_icon_background: "#1E88E5"
  adaptive_icon_foreground: "assets/images/app_logo.png"

flutter:
  uses-material-design: true

  # الصور
  assets:
    - assets/images/

  # الخطوط
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
