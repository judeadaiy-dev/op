name: chat_app
description: تطبيق محادثة احترافي بـ Flutter و Supabase
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Backend - تم التحديث لإصدار مستقر يدعم الهيكلية الحديثة
  supabase_flutter: ^2.6.0
  
  # Firebase - تحديث شامل لإصدارات متوافقة 100% مع أندرويد 14 وفلاتر الجديد
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.0.0

  # UI & Theme
  google_fonts: ^6.2.0
  glassmorphism: ^3.0.0
  flutter_animate: ^4.5.0

  # Images & Files
  image_picker: ^1.1.0
  cached_network_image: ^3.3.1
  
  # Utils
  intl: ^0.19.0
  timeago: ^3.6.1
  uuid: ^4.3.3
  
  # Permissions - المايك، الكاميرا، والتخزين بأذونات الأندرويد الحديثة
  permission_handler: ^11.3.0
  
  # Audio Recording & Player - نسخ مستقرة تمنع تضارب الـ Embedding في الكوتلن
  record: ^5.1.2
  just_audio: ^0.9.38
  
  # File Picker & Path
  file_picker: ^8.0.0
  path_provider: ^2.1.3
  
  # Connectivity - النسخة الذهبية الحديثة التي حلت مشكلة الـ compileSdkVersion تماماً
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  
  # توليد الأيقونة بمقاسات الأندرويد الحديثة
  flutter_launcher_icons: ^0.14.0

# إعدادات الأيقونة الخاصة بك للأندرويد فقط وحذف الـ ios تماماً لمنع أي تداخل
flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/images/app_logo.png"
  min_sdk_android: 23
  adaptive_icon_background: "#1E88E5"
  adaptive_icon_foreground: "assets/images/app_logo.png"

flutter:
  uses-material-design: true

  # مسار الصور
  assets:
    - assets/images/app_logo.png

  # مسارات الخطوط لضمان دمجها داخل الـ APK بنجاح
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
