name: chat_app
description: تطبيق محادثة احترافي بـ Flutter و Supabase
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Backend
  supabase_flutter: ^2.12.4
  
  # Firebase - للإشعارات Push Notifications
  firebase_core: ^4.9.0
  firebase_messaging: ^15.3.0
  flutter_local_notifications: ^18.0.0

  # UI & Theme
  google_fonts: ^6.2.1
  glassmorphism: ^3.0.0
  flutter_animate: ^4.5.2

  # Images & Files
  image_picker: ^1.1.2
  cached_network_image: ^3.4.0
  
  # Utils
  intl: ^0.19.0
  timeago: ^3.7.0
  uuid: ^4.5.1
  
  # Permissions - للمايك والكاميرا والتخزين
  permission_handler: ^11.3.1
  
  # Audio Recording - تم استبدال الحزمة الفرعية القديمة بالحزمة الأم الحديثة لمنع خطأ البناء v1 Embedding
  record: ^7.0.0
  
  # Audio Player - تشغيل الرسائل الصوتية
  just_audio: ^0.10.5
  
  # File Picker - اختيار ملفات
  file_picker: ^8.1.2
  
  # Path - مسارات الملفات
  path_provider: ^2.1.4
  
  # Connectivity - فحص النت
  connectivity_plus: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  
  # توليد الأيقونة بكل المقاسات
  flutter_launcher_icons: ^0.14.0

# إعدادات الأيقونة
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_logo.png"
  min_sdk_android: 23
  remove_alpha_ios: true
  adaptive_icon_background: "#1E88E5"
  adaptive_icon_foreground: "assets/images/app_logo.png"

flutter:
  uses-material-design: true

  # الصور
  assets:
    - assets/images/

  # الخطوط
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
